name: keep-alive

# Pings the Render backend every ~5 minutes so the free instance
# never spins down (Render sleeps after 15 min without traffic).
# Cron fires every 10 min; each run pings twice, 5 min apart, to
# cover GitHub's scheduling delays. Public repo = free minutes.
#
# NOTE: GitHub disables scheduled workflows after 60 days without
# repo activity. Any push re-enables it.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Ping backend twice, 5 min apart
        run: |
          url="https://flyndme-backend.onrender.com/api/ping"
          ping_once() {
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 \
              --retry 2 --retry-delay 15 --retry-all-errors "$url" || echo 000)
            echo "HTTP $code"
            [ "$code" = "200" ]
          }
          ping_once
          sleep 300
          ping_once
