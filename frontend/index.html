<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="fm-deploy-marker" content="og-eur-20260623" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#AE2F34" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#131434" media="(prefers-color-scheme: dark)" />

    <!-- Anti-flash de tema: fija data-theme ANTES de pintar nada (React lo
         re-sincroniza al montar vía useTheme; misma clave de localStorage). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("flyndme_theme");
          var dark = stored === "dark" || ((stored === null || stored === "system")
            && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) { /* sin localStorage: se queda el tema claro por defecto */ }
      })();
    </script>

    <!-- SEO Meta -->
    <title>FlyndMe — Find the cheapest place to meet your group</title>
    <meta name="description" content="FlyndMe compares flights from multiple cities to find where your group can meet at the lowest total cost. Real prices, fairness scoring, and one-click booking." />

    <meta name="author" content="FlyndMe" />
